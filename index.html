<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Clique nos três pontinhos →</title>

<style>
:root{
--bg:#000;
--card:#111;
--text:#fff;
--muted:#aaa;
--accent:#e11d1d;
--border:#333;
font-family:system-ui;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

.wrap{
max-width:420px;
margin:auto;
padding:20px;
opacity:0;
transition:.4s;
}

.card{
background:var(--card);
padding:14px;
border-radius:14px;
border:1px solid var(--border);
}

.guide-title{
text-align:center;
font-weight:700;
margin-bottom:10px;
}

.arrow{
font-size:22px;
animation:bounce 1.2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(6px)}
}

.btn-main{
width:100%;
background:var(--accent);
border:0;
padding:14px;
border-radius:12px;
color:#fff;
font-weight:800;
cursor:pointer;
}

.btn-main:disabled{
background:#333;
cursor:not-allowed;
}
</style>
</head>

<body>

<div id="app-root"></div>

<script>
(function(){

const BOT = "https://t.me/MikaAoyoriVIP_bot";

class Env{

constructor(){
this.isWebView=false;
this.ready=false;
this.auto=null;
}

detect(){
const ua=navigator.userAgent.toLowerCase();

this.isWebView =
ua.includes("wv") ||
/instagram|facebook|fb_iab|tiktok|twitter|snapchat/.test(ua);
}

startRedirect(){
if(this.isWebView) return;

this.auto=setTimeout(()=>{
location.href=BOT;
},1500);
}

stopWebViewChecker(){
if(this.auto){
clearTimeout(this.auto);
this.auto=null;
}
}

}

function render(){

const env=new Env();
env.detect();

document.getElementById("app-root").innerHTML=`

<div class="wrap" id="w">
<div class="card">

<div class="guide-title">
SIGA O TUTORIAL <span class="arrow">👇</span>
</div>

<img src="tutorial.gif" style="width:100%;border-radius:12px">

<br><br>

<button id="btn" class="btn-main" ${env.isWebView?"disabled":""}>
${env.isWebView?"ABRA NO NAVEGADOR":"ABRIR TELEGRAM"}
</button>

</div>
</div>
`;

setTimeout(()=>document.getElementById("w").style.opacity=1,50);

if(!env.isWebView){
env.startRedirect();
}

document.getElementById("btn").onclick=()=>{
if(!env.isWebView){
location.href=BOT;
}
};

}

render();

})();
</script>

</body>
</html>
